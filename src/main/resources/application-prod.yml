spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  data:
    redis:
      url: ${REDIS_URL}
      repositories:
        enabled: false
  flyway:
    enabled: true
    baseline-on-migrate: true

org:
  jobrunr:
    background-job-processor:
      enabled: true
    dashboard:
      enabled: false  # Disable dashboard in prod or secure it

sms-gateway:
  username: ${SMS_GATEWAY_USERNAME}
  password: ${SMS_GATEWAY_PASSWORD}
  api-url: ${SMS_GATEWAY_API_URL:https://api.sms-gate.app/3rdparty/v1/messages}
resend:
  api-key: ${RESEND_API_KEY}
cloudflare:
  r2:
    endpoint: ${R2_ENDPOINT:http://localhost:9000}
    access-key: ${R2_ACCESS_KEY:dev_access_key}
    secret-key: ${R2_SECRET_KEY:dev_secret_key}
    bucket-name: ${R2_BUCKET_NAME:roomconnect}
    public-url: ${R2_PUBLIC_URL:}
    initialize-on-startup: ${R2_INITIALIZE_ON_STARTUP:true}

jwt:
  secret: ${JWT_SECRET}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
