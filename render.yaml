services:
  - type: web
    name: roomconnect-server
    env: java
    plan: free
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/roomconnect-server-0.0.1-SNAPSHOT.jar --spring.profiles.active=prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: roomconnect-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: roomconnect-redis
          property: connectionString
      - key: TWILIO_ACCOUNT_SID
        value: placeholder
      - key: TWILIO_AUTH_TOKEN
        value: placeholder
      - key: TWILIO_FROM_NUMBER
        value: placeholder
      - key: RESEND_API_KEY
        value: placeholder
      - key: R2_ENDPOINT
        value: placeholder
      - key: R2_ACCESS_KEY
        value: placeholder
      - key: R2_SECRET_KEY
        value: placeholder
      - key: R2_BUCKET_NAME
        value: placeholder

databases:
  - name: roomconnect-db
    plan: free
    postgresMajorVersion: "16"

redis:
  - name: roomconnect-redis
    plan: free
    ipAllowList: [] # empty means only internal access allowed
