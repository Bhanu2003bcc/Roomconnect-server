services:
  # ── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: roomconnect-server
    env: docker                        # Java apps require Docker on Render
    plan: free
    envVars:
      # ── Database (individual properties → assembled as JDBC URL in app-prod.yml)
      - key: DB_HOST
        fromDatabase:
          name: roomconnect-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: roomconnect-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: roomconnect-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: roomconnect-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: roomconnect-db
          property: password

      # ── Redis
      - key: REDIS_URL
        fromService:
          type: redis
          name: roomconnect-redis
          property: connectionString

      # ── JWT — auto-generated secure random value on first deploy
      - key: JWT_SECRET
        generateValue: true

      # ── Secrets — fill these in the Render Dashboard before deploying
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY
        sync: false
      - key: R2_SECRET_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false

  # ── Redis ──────────────────────────────────────────────────────────────────
  - type: redis
    name: roomconnect-redis
    plan: free
    ipAllowList: []   # internal access only

# ── PostgreSQL ────────────────────────────────────────────────────────────────
databases:
  - name: roomconnect-db
    plan: free
    postgresMajorVersion: "16"
