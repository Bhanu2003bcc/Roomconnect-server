services:
  # ── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: roomconnect-server
    runtime: docker
    plan: free
    envVars:
      # ── Database (individual properties → assembled as JDBC URL in app-prod.yml)
      - key: DB_HOST
        fromDatabase:
          name: roomconnect-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: roomconnect-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: roomconnect-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: roomconnect-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: roomconnect-db
          property: password

      # ── Redis (Manually configure with existing Render Redis url)
      - key: REDIS_URL
        sync: false

      # ── JWT — auto-generated secure random value on first deploy
      - key: JWT_SECRET
        generateValue: true

      # ── CORS — explicitly allow the Vercel frontend
      - key: CORS_ALLOWED_ORIGINS
        value: https://roomconnect-client.vercel.app

      # ── Secrets — fill these in the Render Dashboard before deploying
      - key: SMS_GATEWAY_USERNAME
        sync: false
      - key: SMS_GATEWAY_PASSWORD
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY
        sync: false
      - key: R2_SECRET_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false

# ── PostgreSQL ────────────────────────────────────────────────────────────────
databases:
  - name: roomconnect-db
    plan: free
    postgresMajorVersion: "16"
